services:
  - type: web
    name: line-expense-tracker-bot
    runtime: node
    plan: free
    buildCommand: npm install && npm run migrate
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 22.18.0
      - key: DATABASE_PATH
        value: ./data/app.db
      - key: IMAGE_STORAGE_PATH
        value: ./uploads
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
      - key: LINE_CHANNEL_SECRET
        sync: false
